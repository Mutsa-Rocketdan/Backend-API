services:
  db:
    image: postgres:16
    container_name: quiz_guide_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: quiz_guide_api
    restart: always
    ports:
      - "${API_EXTERNAL_PORT}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - .:/app
    depends_on:
      - db

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: quiz_guide_tunnel
    restart: always
    # Connects directly to the api service via Docker's internal network (port 8000)
    command: tunnel --url http://api:8000
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    container_name: quiz_guide_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT}:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: quiz_guide_grafana
    restart: always
    ports:
      - "${GRAFANA_EXTERNAL_PORT}:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
