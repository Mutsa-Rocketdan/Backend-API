name: Backend CI (Code Verification)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    name: Run Tests (CI 검증)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Syntax Check (flake8)
        run: |
          pip install flake8
          # 치명적인 파이썬 문법 에러만 우선 검사합니다
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Verification Success
        run: |
          echo "CI Validation passed. The code is safe for integration."
